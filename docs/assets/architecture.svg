<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" fill="none">
  <rect width="900" height="520" rx="12" fill="#1a1b26"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" fill="#c0caf5">mcp-payments — Governed Financial Operations</text>

  <!-- MCP Clients -->
  <rect x="30" y="60" width="160" height="140" rx="8" fill="#24283b" stroke="#565f89" stroke-width="1.5"/>
  <text x="110" y="85" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" fill="#7aa2f7">MCP Clients</text>
  <text x="110" y="110" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#a9b1d6">Claude Desktop</text>
  <text x="110" y="128" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#a9b1d6">Kiro</text>
  <text x="110" y="146" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#a9b1d6">Cursor</text>
  <text x="110" y="164" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#a9b1d6">ADK Agents</text>
  <text x="110" y="182" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#a9b1d6">Custom Clients</text>

  <!-- Arrow: Clients → Server -->
  <path d="M190 130 L250 130" stroke="#565f89" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="220" y="122" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#565f89">stdio/HTTP</text>

  <!-- MCP Server Box -->
  <rect x="250" y="55" width="200" height="200" rx="8" fill="#1f2335" stroke="#7aa2f7" stroke-width="2"/>
  <text x="350" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" fill="#7aa2f7">mcp-payments</text>
  <text x="350" y="95" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#565f89">10 Tools</text>

  <!-- Tools list -->
  <text x="265" y="115" font-family="monospace" font-size="8" fill="#9ece6a">lookup_payment</text>
  <text x="265" y="128" font-family="monospace" font-size="8" fill="#9ece6a">list_customer_payments</text>
  <text x="265" y="141" font-family="monospace" font-size="8" fill="#9ece6a">get_payment_status</text>
  <text x="265" y="154" font-family="monospace" font-size="8" fill="#e0af68">create_checkout_intent</text>
  <text x="265" y="167" font-family="monospace" font-size="8" fill="#f7768e">create_refund_intent</text>
  <text x="265" y="180" font-family="monospace" font-size="8" fill="#f7768e">create_payout_intent</text>
  <text x="265" y="193" font-family="monospace" font-size="8" fill="#e0af68">request_payment_approval</text>
  <text x="265" y="206" font-family="monospace" font-size="8" fill="#f7768e">execute_approved_intent</text>
  <text x="265" y="219" font-family="monospace" font-size="8" fill="#e0af68">reconcile_payment</text>
  <text x="265" y="232" font-family="monospace" font-size="8" fill="#e0af68">attach_payment_evidence</text>

  <!-- Arrow: Server → Components -->
  <path d="M450 130 L520 90" stroke="#565f89" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M450 140 L520 150" stroke="#565f89" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M450 160 L520 210" stroke="#565f89" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M450 180 L520 270" stroke="#565f89" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M450 200 L520 330" stroke="#565f89" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Internal Components -->
  <rect x="520" y="60" width="160" height="45" rx="6" fill="#24283b" stroke="#9ece6a" stroke-width="1.5"/>
  <text x="600" y="80" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="bold" fill="#9ece6a">Intent Store</text>
  <text x="600" y="95" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#a9b1d6">PaymentIntent CRUD</text>

  <rect x="520" y="120" width="160" height="45" rx="6" fill="#24283b" stroke="#e0af68" stroke-width="1.5"/>
  <text x="600" y="140" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="bold" fill="#e0af68">Policy Engine</text>
  <text x="600" y="155" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#a9b1d6">Thresholds + Rules</text>

  <rect x="520" y="180" width="160" height="45" rx="6" fill="#24283b" stroke="#f7768e" stroke-width="1.5"/>
  <text x="600" y="200" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="bold" fill="#f7768e">Approval Queue</text>
  <text x="600" y="215" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#a9b1d6">Human-in-the-loop</text>

  <rect x="520" y="240" width="160" height="45" rx="6" fill="#24283b" stroke="#bb9af7" stroke-width="1.5"/>
  <text x="600" y="260" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="bold" fill="#bb9af7">Evidence Store</text>
  <text x="600" y="275" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#a9b1d6">Receipts + Artifacts</text>

  <rect x="520" y="300" width="160" height="45" rx="6" fill="#24283b" stroke="#73daca" stroke-width="1.5"/>
  <text x="600" y="320" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="bold" fill="#73daca">Ledger</text>
  <text x="600" y="335" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#a9b1d6">Reconciliation</text>

  <!-- Flow Diagram (bottom) -->
  <rect x="30" y="380" width="840" height="120" rx="8" fill="#1f2335" stroke="#414868" stroke-width="1"/>
  <text x="450" y="400" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" fill="#c0caf5">Governance Flow</text>

  <!-- Flow steps -->
  <rect x="50" y="420" width="120" height="50" rx="6" fill="#24283b" stroke="#7aa2f7" stroke-width="1.5"/>
  <text x="110" y="443" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="bold" fill="#7aa2f7">1. Create Intent</text>
  <text x="110" y="458" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#a9b1d6">Agent proposes</text>

  <path d="M170 445 L200 445" stroke="#565f89" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="200" y="420" width="120" height="50" rx="6" fill="#24283b" stroke="#e0af68" stroke-width="1.5"/>
  <text x="260" y="443" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="bold" fill="#e0af68">2. Policy Eval</text>
  <text x="260" y="458" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#a9b1d6">Rules decide</text>

  <path d="M320 445 L350 445" stroke="#565f89" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="350" y="420" width="120" height="50" rx="6" fill="#24283b" stroke="#f7768e" stroke-width="1.5"/>
  <text x="410" y="443" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="bold" fill="#f7768e">3. Approval</text>
  <text x="410" y="458" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#a9b1d6">Humans approve</text>

  <path d="M470 445 L500 445" stroke="#565f89" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="500" y="420" width="120" height="50" rx="6" fill="#24283b" stroke="#9ece6a" stroke-width="1.5"/>
  <text x="560" y="443" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="bold" fill="#9ece6a">4. Execute</text>
  <text x="560" y="458" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#a9b1d6">System runs</text>

  <path d="M620 445 L650 445" stroke="#565f89" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="650" y="420" width="120" height="50" rx="6" fill="#24283b" stroke="#73daca" stroke-width="1.5"/>
  <text x="710" y="443" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="bold" fill="#73daca">5. Reconcile</text>
  <text x="710" y="458" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#a9b1d6">Evidence + Audit</text>

  <!-- Legend -->
  <rect x="720" y="60" width="150" height="100" rx="6" fill="#24283b" stroke="#414868" stroke-width="1"/>
  <text x="795" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="bold" fill="#c0caf5">Risk Classes</text>
  <circle cx="735" cy="95" r="4" fill="#9ece6a"/>
  <text x="745" y="99" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#a9b1d6">read_only</text>
  <circle cx="735" cy="113" r="4" fill="#e0af68"/>
  <text x="745" y="117" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#a9b1d6">internal_write</text>
  <circle cx="735" cy="131" r="4" fill="#f7768e"/>
  <text x="745" y="135" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#a9b1d6">financial_action</text>
  <circle cx="735" cy="149" r="4" fill="#bb9af7"/>
  <text x="745" y="153" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#a9b1d6">evidence/audit</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#565f89" stroke-width="1"/>
    </marker>
  </defs>
</svg>
